esphome:
  name: test-tca8418-8x10

esp32:
  board: esp32-s3-devkitc-1

logger:

i2c:
  sda: GPIO8
  scl: GPIO9

external_components:
  - source:
      type: local
      path: ../components

tca8418_keypad:
  id: kb_8x10
  rows: 8
  columns: 10
  address: 0x34
  keymap:
    1: "K1"
    2: "K2"
    3: "K3"
    4: "K4"
    5: "K5"
    6: "K6"
    7: "K7"
    8: "K8"
    9: "K9"
    10: "K10"
  on_key_press:
    - then:
        - logger.log: "press"
