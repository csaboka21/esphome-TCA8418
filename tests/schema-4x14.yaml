esphome:
  name: test-tca8418-4x14

esp32:
  board: esp32-s3-devkitc-1

logger:

i2c:
  sda: GPIO8
  scl: GPIO9

external_components:
  - source:
      type: local
      path: ../components

tca8418_keypad:
  id: kb_4x14
  rows: 4
  columns: 14
  address: 0x34
  keymap:
    1: "`"
    2: "1"
    3: "2"
    4: "3"
    5: "4"
    6: "5"
    7: "6"
    8: "7"
    11: "\t"
    21: "F"
    22: "S"
    31: "C"
    32: "O"
    33: "A"
  on_key:
    - then:
        - logger.log: "event"
