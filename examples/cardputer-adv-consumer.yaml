esphome:
  name: cardputer-adv-consumer
  friendly_name: Cardputer Consumer Controls

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

i2c:
  sda: GPIO8
  scl: GPIO9

external_components:
  - source:
      type: local
      path: ./components

tca8418_keypad:
  id: kb
  rows: 4
  columns: 14
  address: 0x34
  keymap:
    54: ","
    55: "."
    56: "/"
  on_key:
    - then:
        - lambda: |-
            // Example character-based routing when using keymap-only mode.
            if (!pressed) {
              return;
            }
            if (key_char == ',') {
              ESP_LOGI("consumer", "Volume down action");
            } else if (key_char == '.') {
              ESP_LOGI("consumer", "Volume up action");
            } else if (key_char == '/') {
              ESP_LOGI("consumer", "Mute action");
            }
