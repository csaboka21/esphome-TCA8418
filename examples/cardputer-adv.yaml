esphome:
  name: cardputer-adv-kbd
  friendly_name: Cardputer Advanced Keyboard

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ./components

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true

tca8418_keypad:
  id: cardputer_kb
  rows: 4
  columns: 14
  address: 0x34
  update_interval: 10ms
  debounce_ms: 12ms
  long_press_ms: 500ms
  # Optional IRQ line from TCA8418 INT pin (active low).
  # interrupt_pin: GPIO10
  keymap:
    1: "'"
    2: ""
    3: ""
    4: ""
    5: "1"
    6: "q"
    7: "7"
    8: ""
    9: ""
    10: ""
    11: "2"
    12: "w"
    13: "a"
    14: ""
    15: "3"
    16: "e"
    17: "s"
    18: "z"
    19: ""
    20: ""
    21: "4"
    22: "r"
    23: "d"
    24: "x"
    25: "5"
    26: "t"
    27: "f"
    28: "c"
    29: ""
    30: ""
    31: "6"
    32: "y"
    33: "g"
    34: "v"
    35: "7"
    36: "u"
    37: "h"
    38: "b"
    39: ""
    40: ""
    41: "8"
    42: "i"
    43: "j"
    44: "n"
    45: "9"
    46: "o"
    47: "k"
    48: "m"
    49: ""
    50: ""
    51: "0"
    52: "p"
    53: "l"
    54: ","
    55: "_"
    56: "["
    57: ";"
    58: "."
    59: ""
    60: ""
    61: "="
    62: "]"
    63: "'"
    64: "/"
    65: ""
    66: "\\"
    67: ""
    68: " "
  on_key:
    - then:
        - lambda: |-
            ESP_LOGI(
              "kbd",
              "Event row=%u col=%u pressed=%s key=%c raw=%u long=%s",
              row,
              col,
              pressed ? "true" : "false",
              key_char ? static_cast<char>(key_char) : 0x00,
              keycode,
              long_press ? "true" : "false"
            );
  on_key_press:
    - then:
        - lambda: |-
            ESP_LOGD("kbd", "press key=%c", key_char ? static_cast<char>(key_char) : 0x00);
  on_key_release:
    - then:
        - lambda: |-
            if (long_press) {
              ESP_LOGI("kbd", "long release key=%c", key_char ? static_cast<char>(key_char) : 0x00);
            }
