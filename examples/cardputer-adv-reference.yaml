esphome:
  name: cardputer-adv-reference
  friendly_name: Cardputer ADV Keyboard (Reference Map)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ./components

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true

tca8418_keypad:
  id: cardputer_kb
  # Cardputer ADV uses TCA8418 electrical scanning (7x8),
  # while its physical keyboard is arranged as 4x14.
  rows: 7
  columns: 8
  address: 0x34
  debounce_ms: 12ms
  long_press_ms: 500ms
  # RetroBreeze reference: INT is GPIO11 (active-low)
  interrupt_pin: GPIO11

  on_key:
    - then:
        - lambda: |-
            ESP_LOGI(
              "kbd_ref",
              "row=%u col=%u pressed=%s key=%c raw=%u long=%s",
              row,
              col,
              pressed ? "true" : "false",
              key_char ? static_cast<char>(key_char) : '?',
              keycode,
              long_press ? "true" : "false"
            );
