esphome:
  name: cardputer-adv-kbd-irq
  friendly_name: Cardputer Advanced Keyboard (IRQ)

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      type: local
      path: ./components

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true

tca8418_keypad:
  id: cardputer_kb
  rows: 4
  columns: 14
  address: 0x34
  update_interval: 10ms
  debounce_ms: 12ms
  long_press_ms: 500ms
  # Connect TCA8418 INT (active low) to this GPIO.
  interrupt_pin: GPIO10
  keymap:
    1: "`"
    2: "1"
    3: "2"
    4: "3"
    5: "4"
    6: "5"
    7: "6"
    8: "7"
    9: "8"
    10: "9"
    11: "\t"
    12: "Q"
    13: "W"
    14: "E"
    15: "R"
    16: "T"
    21: "F"
    22: "S"
    23: "A"
    24: "S"
    25: "D"
    26: "F"
    31: "C"
    32: "O"
    33: "A"
    34: "Z"
    35: "X"
    36: "C"
  on_key:
    - then:
        - lambda: |-
            ESP_LOGI(
              "kbd_irq",
              "row=%u col=%u pressed=%s key=%c raw=%u long=%s",
              row,
              col,
              pressed ? "true" : "false",
              key_char ? static_cast<char>(key_char) : '?',
              keycode,
              long_press ? "true" : "false"
            );
